<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CricShield - Live Score</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #00E5FF;
      --accent-hover: #00c4db;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(to bottom, rgba(0,229,255,0.05) 0%, transparent 100%);
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .container {
      padding: 20px;
    }

    .status-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .status-icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .status-title {
      font-weight: 600;
      font-size: 16px;
      margin: 0 0 4px 0;
      color: var(--accent);
    }

    .status-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.4;
    }

    .footer {
      padding: 12px 20px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      border-top: 1px solid var(--border);
      background-color: rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ CricShield</h1>
  </div>
  <div class="container">
    <div class="status-card">
      <span class="status-icon">✅</span>
      <div class="status-title">CricShield Active</div>
      <p class="status-desc">
        Overlay is ready. Live match scores will automatically replace ads on Hotstar and JioCinema.
      </p>
    </div>
  </div>
  <div class="footer">
    Configuration Free • Made with ❤️
  </div>
</body>
</html>
